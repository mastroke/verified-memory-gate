name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,daemon]"

      - name: Run tests
        run: python -m pytest -q

      - name: GateMem regression gate
        run: |
          python -c "
          from verified_memory_gate import GateMemThresholds, run_harness
          report = run_harness()
          score = report.score
          print('MGS', score.as_dict())
          assert report.passes(GateMemThresholds()), score.as_dict()
          "
